name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check docwhisper/

      - name: Run tests
        run: pytest tests/ --cov=docwhisper --cov-report=term-missing

  # optional eval gate — only runs when OPENAI_API_KEY is available
  eval:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[all]"

      - name: Run eval (skips gracefully if no API key)
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No OPENAI_API_KEY set — skipping eval job."
            exit 0
          fi
          python -m docwhisper.ingest --docs-dir examples/sample_docs
          python -m docwhisper.eval --eval-file examples/eval_questions.json

  regression-gate:
    runs-on: ubuntu-latest
    needs: eval
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install with observability extras
        run: pip install -e ".[all]"

      - name: Restore baseline (from cache)
        uses: actions/cache@v4
        with:
          path: .docwhisper_baselines.json
          key: docwhisper-baseline-${{ github.ref }}
          restore-keys: docwhisper-baseline-

      - name: Ingest sample docs
        run: python -m docwhisper.ingest --docs-dir examples/sample_docs

      - name: Run eval with regression gate
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No OPENAI_API_KEY — skipping regression gate."
            exit 0
          fi
          python -m docwhisper.eval \
            --eval-file examples/eval_questions.json \
            --run-name "ci-${{ github.sha }}" \
            --fail-on-regression \
            --save-baseline

      - name: Save updated baseline to cache
        uses: actions/cache@v4
        with:
          path: .docwhisper_baselines.json
          key: docwhisper-baseline-${{ github.ref }}-${{ github.sha }}
